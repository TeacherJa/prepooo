<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Room Explorer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
        }

        /* Game Container holds the background image */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('alex room.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Dark overlay that masks the background */
        #dark-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.98);
            pointer-events: none; /* Allows clicking through to interactive items */
            transition: background 0.05s linear;
        }

        /* Quiz Interface Container */
        #quiz-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 10;
        }

        #question-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .option-btn {
            background-color: #f0f0f0;
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-btn:hover {
            background-color: #e0e0e0;
            border-color: #999;
        }

        .option-btn.correct {
            background-color: #2ecc71;
            color: white;
            border-color: #27ae60;
        }

        .option-btn.wrong {
            background-color: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        #feedback {
            font-size: 1.1rem;
            font-weight: bold;
            height: 25px;
            margin-bottom: 10px;
        }

        #next-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            margin: 0 auto;
        }

        #next-btn:hover {
            background-color: #2980b9;
        }

        /* Score & Progress Tracker */
        #progress-bar {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        /* Hidden target hot-spots in the room (Optional visual guide/debug or clickable zones) */
        .item-marker {
            position: absolute
